<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نتيجة حساب العمر</title>

<link rel="icon" href="icon.png">

<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
margin:0;
background:#0b0d12;
color:#fff;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.top{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:20px;
}

.back-btn,.share-btn{
background:#1b1e26;
border:none;
color:#fff;
padding:10px 16px;
border-radius:12px;
cursor:pointer;
}

.brand{
font-size:22px;
font-weight:bold;
}

.box{
background:#151922;
padding:20px;
border-radius:20px;
margin-bottom:16px;
}

.live-grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
}

.live-card{
background:#1b1e26;
padding:16px;
border-radius:16px;
text-align:center;
}

.live-value{
font-size:22px;
font-weight:bold;
}

.result-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.result-card{
background:#1b1e26;
padding:14px;
border-radius:16px;
}

.result-card-title{
font-size:14px;
opacity:.7;
}

.result-card-value{
font-size:18px;
font-weight:bold;
margin-top:6px;
}

.note{
margin-top:14px;
opacity:.7;
font-size:14px;
text-align:center;
}

@media(max-width:500px){

.result-grid{
grid-template-columns:1fr;
}

.live-grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="container">

<div class="top">

<button class="back-btn" id="backBtn">← رجوع</button>

<div class="brand">Noor</div>

<button class="share-btn" id="shareBtn">مشاركة</button>

</div>


<div class="box">

<h3>عداد العمر المباشر</h3>

<div class="live-grid">

<div class="live-card">
<div class="live-value" id="liveHours">0</div>
<div>ساعة</div>
</div>

<div class="live-card">
<div class="live-value" id="liveMinutes">0</div>
<div>دقيقة</div>
</div>

<div class="live-card">
<div class="live-value" id="liveSeconds">0</div>
<div>ثانية</div>
</div>

</div>

</div>


<div class="box">

<div class="result-grid" id="resultGrid"></div>

<div class="note">
بعض النتائج تقريبية وليست دقيقة 100٪
</div>

</div>

</div>


<script>

const data = JSON.parse(localStorage.getItem("ageCalcData") || "{}")

if(!data.selectedDay){
window.location.href="index.html"
}

const birthDate = new Date(
data.selectedYear,
data.selectedMonth-1,
data.selectedDay
)

const now = new Date()

let years = now.getFullYear() - birthDate.getFullYear()
let months = now.getMonth() - birthDate.getMonth()
let days = now.getDate() - birthDate.getDate()

if(days<0){
months--
days+=30
}

if(months<0){
years--
months+=12
}

const diff = now - birthDate

const totalDays=Math.floor(diff/86400000)
const totalHours=Math.floor(diff/3600000)
const totalMinutes=Math.floor(diff/60000)
const totalSeconds=Math.floor(diff/1000)

const hijriYears=Math.floor(totalDays/354)

const water=totalDays*2
const sleep=totalDays*8
const meals=totalDays*3
const prayers=(years-7)*354*5
const heart=totalMinutes*70

const grid=document.getElementById("resultGrid")

function add(title,value){

grid.innerHTML+=`
<div class="result-card">
<div class="result-card-title">${title}</div>
<div class="result-card-value">${value}</div>
</div>
`

}

add("العمر الميلادي",years+" سنة")
add("الأشهر",months+" شهر")
add("الأيام",days+" يوم")
add("مجموع الأيام",totalDays.toLocaleString()+" يوم")
add("العمر الهجري",hijriYears+" سنة")
add("كمية الماء",water.toLocaleString()+" لتر")
add("ساعات النوم",sleep.toLocaleString()+" ساعة")
add("عدد الوجبات",meals.toLocaleString()+" وجبة")
add("عدد الصلوات",prayers.toLocaleString()+" صلاة")
add("كم ساعة عشت",totalHours.toLocaleString()+" ساعة")
add("نبضات القلب",heart.toLocaleString()+" نبضة")

function updateCounter(){

const now=new Date()
const diff=now-birthDate

const h=Math.floor(diff/3600000)
const m=Math.floor(diff/60000)
const s=Math.floor(diff/1000)

document.getElementById("liveHours").innerText=h.toLocaleString()
document.getElementById("liveMinutes").innerText=m.toLocaleString()
document.getElementById("liveSeconds").innerText=s.toLocaleString()

}

updateCounter()

setInterval(updateCounter,1000)

document.getElementById("backBtn").onclick=function(){
window.location.href="index.html"
}

document.getElementById("shareBtn").onclick=function(){

const text=grid.innerText

if(navigator.share){
navigator.share({
title:"نتيجة حساب العمر",
text:text,
url:location.origin
})
}else{
navigator.clipboard.writeText(text)
alert("تم النسخ")
}

}

</script>

</body>
</html>
