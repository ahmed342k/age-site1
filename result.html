<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>النتيجة</title>

<link rel="icon" href="icon.png">

<style>

body{

background:#0f1117;
color:white;
font-family:Arial;
padding:20px;

}

.container{

max-width:520px;
margin:auto;

}

.grid{

display:grid;
grid-template-columns:1fr 1fr;
gap:10px;

}

.card{

background:#171a22;
padding:15px;
border-radius:14px;

}

.title{

font-size:14px;
opacity:.7;
margin-bottom:6px;

}

.value{

font-size:20px;
font-weight:bold;

}

.btn{

margin-top:15px;
padding:12px;
border:none;
background:#4f8cff;
color:white;
border-radius:12px;
width:100%;
cursor:pointer;

}

.back{

display:block;
margin-top:15px;
text-align:center;

}

</style>
</head>


<body>

<div class="container">

<div class="grid" id="grid"></div>

<button class="btn" onclick="share()">مشاركة</button>

<a class="back" href="index.html">رجوع</a>

</div>


<script>

let data=JSON.parse(localStorage.getItem("ageData"))

let birth=data.birth

let today=new Date()

let b=new Date(birth.y,birth.m-1,birth.d)

let days=Math.floor((today-b)/86400000)

let years=Math.floor(days/365)

let grid=document.getElementById("grid")

function card(t,v){

grid.innerHTML+=`

<div class="card">
<div class="title">${t}</div>
<div class="value">${v}</div>
</div>

`

}

if(data.opts.age){

card("العمر",years+" سنة")

}

if(data.opts.hijri){

card("العمر الهجري",Math.floor(days/354)+" سنة")

}

if(data.opts.water){

card("الماء",days*2+" لتر")

}

if(data.opts.sleep){

card("النوم",days*8+" ساعة")

}

if(data.opts.meals){

card("الوجبات",days*3)

}

if(data.opts.ramadan){

card("رمضان",Math.floor(days/354))

}

if(data.opts.prayers){

card("الصلوات",(days*5).toLocaleString())

}

if(data.opts.hours){

card("الساعات",(days*24).toLocaleString())

}

if(data.opts.heart){

card("نبضات القلب",(days*100000).toLocaleString())

}


function share(){

let txt=document.body.innerText

if(navigator.share){

navigator.share({

title:"Age Result",
text:txt

})

}

}

</script>

</body>
</html>
